$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: ECRR Interface/API Profile
description: Complete ECRR metadata profile for interface and API resources. Composes
  ecrrBase, ecrrCommon, and ecrrAssessment. Resources must have schema:additionalType
  containing "EC Interface_API".
allOf:
- $ref: https://usgin.github.io/ecrrBuildingBlocks/build/annotated/ecrrProperties/ecrrBase/schema.yaml
- $ref: https://usgin.github.io/ecrrBuildingBlocks/build/annotated/ecrrProperties/ecrrCommon/schema.yaml
- $ref: https://usgin.github.io/ecrrBuildingBlocks/build/annotated/ecrrProperties/ecrrAssessment/schema.yaml
- properties:
    schema:additionalType:
      contains:
        enum:
        - EC Interface_API
x-jsonld-extra-terms:
  ecrr: https://n2t.net/ark:/23942/g2
x-jsonld-prefixes:
  schema: http://schema.org/
  ecrro: http://cor.esipfed.org/ont/earthcube/
  dct: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
